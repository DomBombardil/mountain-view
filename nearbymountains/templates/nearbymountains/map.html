{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Mountains Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="{% static 'nearbymountains/css/map.css' %}">
</head>
<body>
    <div class="layout">
        <div id="sidebar" class="sidebar">
            <h2>Nearby Mountains</h2>
            <ul id="mountain-list"></ul>
        </div>

        <div class="map-section">
            <div class="controls">
            <label for ="location-input">Location:</label>
            <input
                type="text"
                id="location-input"
                placeholder="e.g. 83301 Traunreut">

                <button id="search-location-btn">Search Location</button>

                <label for="radius">Radius (km):</label>
                <input type="number" id="radius" value="50" min="1" step="1">

                <button id="locate-btn">Use My Location</button>
            </div>

            <div id="message" class="message">
                Click "Use My Location" to load nearby mountains.
            </div>

            <div id="map"></div>

            <div id="selected-mountain" class="selected-mountain">
                <h3>Selected Mountain</h3>
                <p id="selected-name">None</p>
                <p id="selected-elevation"></p>
                <p id="selected-distance"></p>

                <label for="route-profile">Route mode:</label>
                <select id="route-profile">
                    <option value="foot-hiking">Hiking</option>
                    <option value="driving-car">Driving</option>
                </select>

                <button id ="show-route-btn" type="button">Show Route</button>
                <button id ="clear-route-btn" type="button">Clear Route</button>

                <div id ="route-info" class="route-info">
                    <p id="route-distance"></p>
                    <p id="route-duration"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="{% static 'nearbymountains/js/map.js' %}"></script>
</body>
</html>
